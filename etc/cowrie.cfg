# Cowrie runtime config overrides. Loaded on top of cowrie.cfg.dist, so only
# list things we're changing from the defaults.

# ============================================================================
# backend = shell  (default — reverted from llm)
#
# Architecture:
#   raw command ─> scalpel lookup (pre-filter in shell/honeypot.py)
#                    hit  -> write canned output, done (Tier 1)
#                    miss -> cowrie native command dispatch via commands/
#                              hit  -> run the native impl against fs.pickle
#                              miss -> "bash: cmd: command not found"
#
# Why we left backend=llm: ps aux, ls, cat all fell through to Ollama on
# lookup misses, which either hung (no timeout on the deferred) or got cut
# off mid-stream by max_tokens. Shell backend gives us cowrie's native ~50
# command implementations (ls, cat, cd, pwd, ps, free, uptime, netstat, ...)
# which are fast, deterministic, and walk our hardened fs.pickle.
#
# LLM escalation can be reintroduced later as a final fallback replacing
# the "command not found" branch in shell/honeypot.py runCommand().
# ============================================================================
[honeypot]
# Must match the hostname baked into uname -a / hostnamectl / /etc/hosts /
# /etc/hostname lookups. Default is svr04, which contradicts every other
# identity probe and the red team would catch it instantly.
hostname = raspberrypi

# ============================================================================
# LLM backend -> local Ollama
# Ollama exposes an OpenAI-compatible endpoint at /v1/chat/completions, so
# cowrie's existing LLMClient works unchanged. The scalpel router fields
# Tier 1 before anything hits here; only lookup misses reach the LLM.
#
# Pin the model in memory on the Pi so the first prompt doesn't pay the
# 30-40s load penalty (red team would latency-fingerprint it instantly):
#   sudo systemctl edit ollama
#     [Service]
#     Environment="OLLAMA_KEEP_ALIVE=-1"
#   sudo systemctl restart ollama
#   ollama run qwen2.5:1.5b ""     # forces initial load
# Verify the model is resident:
#   curl http://localhost:11434/api/ps
# ============================================================================
[llm]
host = http://localhost:11434
path = /v1/chat/completions
model = qwen2.5:1.5b
# Ollama ignores the api_key but cowrie's LLMClient logs a warning if empty.
api_key = ollama
# Low temperature: we want deterministic-looking bash output, not creative prose.
temperature = 0.2
max_tokens = 500
